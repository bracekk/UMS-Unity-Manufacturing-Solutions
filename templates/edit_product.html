{% extends "base.html" %}

{% block title %}UMS | Edit Product{% endblock %}

{% block content %}
<div class="jobs-header">
  <div class="jobs-header-left">
    <span class="eyebrow-label">Products</span>
    <h1>Edit Product</h1>
    <p>Update finished product details, stock and production settings.</p>
  </div>

  <div class="jobs-header-right">
    <a href="{{ url_for('products') }}" class="dashboard-btn secondary">Back to Products</a>
  </div>
</div>

<div class="dashboard-form-card product-form-card product-form-shell">
  <form method="POST" class="order-form product-clean-form">
    <div class="form-grid form-grid-2 product-form-grid">
      <div class="form-group floating-group">
        <input
          type="text"
          id="product_code"
          name="product_code"
          value="{{ product.product_code }}"
          placeholder=" "
          required
        >
        <label for="product_code">Product Code</label>
      </div>

      <div class="form-group floating-group">
        <input
          type="text"
          id="product_name"
          name="product_name"
          value="{{ product.product_name }}"
          placeholder=" "
          required
        >
        <label for="product_name">Product Name</label>
      </div>

      <div class="form-group product-select-group">
        <label>Measurement Unit</label>

        <div class="custom-select" data-name="measurement_unit">
          <div class="custom-select-trigger" tabindex="0" role="button" aria-label="Select measurement unit">
            <span>{{ product.measurement_unit }}</span>
          </div>

          <div class="custom-options">
            <div class="custom-option {% if product.measurement_unit == 'pcs' %}selected{% endif %}" data-value="pcs">pcs</div>
            <div class="custom-option {% if product.measurement_unit == 'm' %}selected{% endif %}" data-value="m">m</div>
            <div class="custom-option {% if product.measurement_unit == 'm2' %}selected{% endif %}" data-value="m2">m2</div>
            <div class="custom-option {% if product.measurement_unit == 'liter' %}selected{% endif %}" data-value="liter">liter</div>
          </div>

          <input type="hidden" name="measurement_unit" value="{{ product.measurement_unit }}">
        </div>
      </div>

      <div class="form-group floating-group">
        <input
          type="number"
          step="0.01"
          id="time_per_unit"
          name="time_per_unit"
          value="{{ product.time_per_unit }}"
          placeholder=" "
          required
        >
        <label for="time_per_unit">Time per Unit (min)</label>
      </div>

      <div class="form-group floating-group">
        <input
          type="number"
          step="0.01"
          min="0"
          id="stock_quantity"
          name="stock_quantity"
          value="{{ product.stock_quantity }}"
          placeholder=" "
          required
        >
        <label for="stock_quantity">Stock Quantity</label>
      </div>

      <div class="form-group form-group-full floating-group product-description-group">
        <textarea
          id="description"
          name="description"
          rows="5"
          placeholder=" "
        >{{ product.description }}</textarea>
        <label for="description">Description</label>
      </div>
    </div>

    <div class="form-actions product-form-actions">
      <a href="{{ url_for('products') }}" class="dashboard-btn secondary">Cancel</a>
      <button type="submit" class="dashboard-btn primary">Update Product</button>
    </div>
  </form>
</div>
{% endblock %}
