<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMS | Reset Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>
<body class="auth-body">
  <div class="auth-page">
    <div class="auth-shell auth-shell-compact auth-shell-register">
      <a href="{{ url_for('home') }}" class="auth-logo">
        <span class="auth-logo-u">U</span><span class="auth-logo-m">M</span><span class="auth-logo-s">S</span>
      </a>

      <div class="auth-header">
        <span class="auth-badge">Recovery</span>
        <h1>Create a new password</h1>
        <p>{{ email }}</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="auth-flash-stack">
            {% for category, message in messages %}
              <div class="auth-flash auth-flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" class="auth-form auth-form-grid">
        <div class="auth-field auth-field-full">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a new password"
            autocomplete="new-password"
            required
          >
        </div>

        <div class="auth-field auth-field-full">
          <label for="confirm_password">Confirm Password</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Repeat your new password"
            autocomplete="new-password"
            required
          >
        </div>

        <button type="submit" class="auth-btn auth-btn-primary auth-btn-full">Reset Password</button>
      </form>

      <p class="auth-footer-text">
        <a href="{{ url_for('login') }}">Back to login</a>
      </p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
